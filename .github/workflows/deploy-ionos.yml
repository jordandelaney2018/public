name: Deploy to IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ionos-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy plugin and theme
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SFTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy tracked WordPress code
        env:
          IONOS_SFTP_HOST: ${{ secrets.IONOS_SFTP_HOST }}
          IONOS_SFTP_USER: ${{ secrets.IONOS_SFTP_USER }}
          IONOS_SFTP_PASSWORD: ${{ secrets.IONOS_SFTP_PASSWORD }}
          IONOS_SFTP_PORT: ${{ secrets.IONOS_SFTP_PORT || '22' }}
          IONOS_REMOTE_PATH: ${{ secrets.IONOS_REMOTE_PATH }}
        run: |
          set -euo pipefail

          : "${IONOS_SFTP_HOST:?Missing IONOS_SFTP_HOST secret}"
          : "${IONOS_SFTP_USER:?Missing IONOS_SFTP_USER secret}"
          : "${IONOS_SFTP_PASSWORD:?Missing IONOS_SFTP_PASSWORD secret}"
          : "${IONOS_SFTP_PORT:?Missing IONOS_SFTP_PORT secret}"
          : "${IONOS_REMOTE_PATH:?Missing IONOS_REMOTE_PATH secret}"

          REMOTE_ROOT="${IONOS_REMOTE_PATH%/}"

          lftp -u "${IONOS_SFTP_USER}","${IONOS_SFTP_PASSWORD}" -p "${IONOS_SFTP_PORT}" "sftp://${IONOS_SFTP_HOST}" <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 20

          mkdir -p "${REMOTE_ROOT}/plugins/draft-league-hub"
          mirror -R --delete --verbose "wp-content/plugins/draft-league-hub" "${REMOTE_ROOT}/plugins/draft-league-hub"

          mkdir -p "${REMOTE_ROOT}/themes/draft-league-theme"
          mirror -R --delete --verbose "wp-content/themes/draft-league-theme" "${REMOTE_ROOT}/themes/draft-league-theme"

          bye
          EOF
